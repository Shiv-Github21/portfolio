name: Deploy portfolio to GitHub Pages

# Runs automatically every time you push to the main branch.
# This is the "CI/CD pipeline" part of the project: no manual
# uploading, no FTP, no clicking "publish" anywhere — git push
# is the deploy button.

on:
  push:
    branches: ["main"]
  workflow_dispatch: # lets you trigger a deploy manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site as a Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
